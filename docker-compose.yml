version: '2.1'

services:
  backend:
    build: ./server
    container_name: express_container
    ports:
      - '3000:3000'
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - code-abc-network
    depends_on:
      - frontend

  frontend:
    build: ./client
    container_name: react_container
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - code-abc-network


networks:
  code-abc-network:
    driver: bridge